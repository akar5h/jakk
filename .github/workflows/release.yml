name: release

# Builds, tests, and validates the package on a v* tag, then attaches the
# sdist + wheel + checksums to the GitHub Release.
#
# PyPI publishing is stubbed (commented) pending a PyPI "Trusted Publisher"
# configured on the PyPI side (Settings → Publishing → add this repo +
# workflow). Until then, releases ship as GitHub Release artifacts.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install + test
        run: |
          python -m pip install --upgrade pip build twine
          pip install -e ".[dev]"
          pytest tests/unit -q
      - name: Build
        run: python -m build
      - name: Validate
        run: twine check dist/*
      - name: Checksums
        run: cd dist && sha256sum jakk-* > CHECKSUMS.txt && cat CHECKSUMS.txt
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/CHECKSUMS.txt
          body_path: CHANGELOG.md

