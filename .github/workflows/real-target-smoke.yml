name: Real target smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/real-target-smoke.yml"
      - "action.yml"
      - "library/mcp/**"
      - "jakk/**"

permissions:
  contents: read
  security-events: write

jobs:
  github-mcp-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start GitHub MCP server
        run: |
          docker run -d --rm \
            --name jakk-github-mcp \
            -p 8082:8082 \
            ghcr.io/github/github-mcp-server \
            http --read-only --port 8082

      - name: Wait for MCP server container
        run: |
          for i in {1..30}; do
            if docker ps --filter "name=jakk-github-mcp" --filter "status=running" --format '{{.Names}}' | grep -qx jakk-github-mcp; then
              sleep 2
              exit 0
            fi
            sleep 1
          done
          docker logs jakk-github-mcp || true
          exit 1

      - name: Run jakk against GitHub MCP server
        uses: ./
        with:
          endpoint: "http://127.0.0.1:8082/mcp"
          args: "--bearer ${{ github.token }} --safe"
          fail-on-fired: "false"
          jsonl: "jakk-github-mcp-smoke.jsonl"
          sarif: "jakk-github-mcp-smoke.sarif"

      - name: Verify real-target smoke output
        run: |
          test -s jakk-github-mcp-smoke.jsonl
          test -s jakk-github-mcp-smoke.sarif
          python - <<'PY'
          import json
          from collections import Counter
          from pathlib import Path

          findings = [json.loads(line) for line in Path("jakk-github-mcp-smoke.jsonl").read_text().splitlines()]
          sarif = json.loads(Path("jakk-github-mcp-smoke.sarif").read_text())
          assert findings, "expected at least one finding row"
          assert sarif["version"] == "2.1.0"
          assert sarif["runs"][0]["tool"]["driver"]["name"] == "jakk"
          outcomes = Counter(f["outcome"] for f in findings)
          print(f"verified {len(findings)} finding rows against github-mcp-server")
          print("outcomes:", dict(sorted(outcomes.items())))
          print(f"SARIF results: {len(sarif['runs'][0]['results'])}")
          PY

      - name: Upload SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: jakk-github-mcp-smoke.sarif

      - name: Upload real-target findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jakk-github-mcp-smoke-findings
          path: |
            jakk-github-mcp-smoke.jsonl
            jakk-github-mcp-smoke.sarif

      - name: Stop GitHub MCP server
        if: always()
        run: docker stop jakk-github-mcp || true
