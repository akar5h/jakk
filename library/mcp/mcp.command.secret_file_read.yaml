id: mcp.command.secret_file_read
surface: tool_call
side_effect: unsafe  # shell injection + reads filesystem; will trigger SIEM rules
description: |
  Follow-up to shell_marker. Uses command substitution to read a
  canary secrets file (mounted in the breach-to-fix ch08 vulnerable
  container at /app/secrets/deployment_token.txt; also tries /etc/passwd
  as a generic Linux canary). If file contents flow into the tool
  response, the injection reads filesystem state.
owasp: [MCP05]
atlas: [AML.T0051, AML.T0024]
severity: critical
expected_signal: input.command_injection

applies_to:
  tool_name_regex: "(?i)(git|repo|exec|run|init|build|clone|fetch|pull|shell|cmd)"
  min_string_args: 1

payload:
  # Command chaining via `;` rather than `$(…)` substitution: the latter
  # injects multi-line file contents into the host command's positional
  # args, which usually trips an argv-count error and prints a banner
  # instead of the file contents. Chained commands run independently and
  # their stdout is captured alongside the host command's.
  arguments:
    __first_string_arg__: "x{run_id}; cat /app/secrets/deployment_token.txt 2>/dev/null; cat /etc/passwd 2>/dev/null | head -2"

matcher:
  kind: secret_pattern
