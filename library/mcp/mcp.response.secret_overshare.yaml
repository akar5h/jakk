id: mcp.response.secret_overshare
surface: tool_call
side_effect: safe  # calls a benign-looking read tool with empty arguments
description: |
  Call the lowest-friction enumeration tool (a `list_*` / `get_*` / `read_*`
  without required string args is best) and scan the response for
  secret-shaped fields: PEM blocks, /etc/passwd lines, CTF flags,
  api_key/token/password assignments, AWS/GitHub/OpenAI key shapes.
  Fires when an MCP server leaks credentials through what looks like
  a routine read.
owasp: [MCP02, MCP05]
atlas: [AML.T0024]
severity: high
expected_signal: response.secret_leak

applies_to:
  # Benign-looking enumeration tools that should work without arguments.
  # `require_no_required_args` filters out tools like ch02's
  # read_file_contents(file_path) that match the regex but need an arg —
  # without the filter, the probe sends {} and the server returns
  # isError=True, producing a noisy `error` outcome that isn't a finding.
  tool_name_regex: "(?i)^(list|get|read|describe|status|info|inventory|repositories|files|tools)"
  require_no_required_args: true

payload:
  arguments: {}

matcher:
  kind: secret_pattern
