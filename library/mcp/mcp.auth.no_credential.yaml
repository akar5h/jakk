id: mcp.auth.no_credential
surface: auth
side_effect: safe  # one tools/list call with no credentials
description: |
  Opens an MCP connection with no Authorization header. A server that
  returns a tool list (instead of 401/403/connection failure) is exposing
  its tool surface to anonymous callers. Common misconfiguration when a
  proxy/auth layer is supposed to gate access but isn't wired up.

  Skipped semantics: jakk never sees the server's own auth state. If the
  server is *intentionally* public (read-only docs, etc.), set
  `auth_override.expect_success: pass` in a local override, or use
  `--owasp` / `--select` to skip the probe.
owasp: [MCP10]  # OWASP-for-MCP "auth & access" cluster
atlas: [AML.T0018]  # Establish Accounts
severity: critical
expected_signal: auth.anonymous_access

auth_override:
  mode: none
  expect_success: vulnerable
